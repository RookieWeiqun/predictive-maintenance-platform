services:
  postgres:
    image: postgres:15-alpine
    container_name: predictive-maintenance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: PredictiveMaintenance
      POSTGRES_PASSWORD: "PsmDig@2026"
      POSTGRES_DB: PredictiveMaintenancePlatform
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U PredictiveMaintenance -d PredictiveMaintenancePlatform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
